name: Performance Issue
description: Report a performance problem
title: "[Performance]: "
labels: ["performance"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Performance Issue Description
      description: What performance issue did you encounter?
    validations:
      required: true

  - type: textarea
    id: benchmark
    attributes:
      label: Benchmark Results
      description: Include benchmark output if available
      render: text

  - type: textarea
    id: comparison
    attributes:
      label: Comparison with fastbloom
      description: How does it compare with fastbloom?

  - type: input
    id: dataset-size
    attributes:
      label: Dataset Size
      description: Number of elements in your test
      placeholder: "1000000"