<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Neon Luminescence Glow Filter for Active Bits -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Embedded Stylesheet -->
    <style>
      .bg { fill: #0D0E12; }
      .b0 { fill: #251820; opacity: 0.85; }
      .b1 { fill: #FF409F; filter: url(#glow); }
      .text-brand { font-family: 'Courier New', Courier, monospace; font-weight: 900; fill: #FFFFFF; letter-spacing: 4px; }
      .text-sub { font-family: 'Courier New', Courier, monospace; fill: #52464D; font-size: 11px; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Background Card -->
  <rect width="100%" height="100%" fill="none" rx="20" />

  <!-- Core Graphic Layout (Centered at 250, 225) -->
  <g transform="translate(250, 225)">
    
    <!-- Central Pistil / Core Bit Indices -->
    <rect x="-14" y="-14" width="8" height="8" rx="1.5" class="b1" />
    <rect x="6" y="-14" width="8" height="8" rx="1.5" class="b0" />
    <rect x="-14" y="6" width="8" height="8" rx="1.5" class="b0" />
    <rect x="6" y="6" width="8" height="8" rx="1.5" class="b1" />

    <!-- ================= PETAL 1 (0° - TOP) ================= -->
    <g transform="rotate(0)">
      <rect x="-4" y="-30" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-14" y="-40" width="8" height="8" rx="1.5" class="b1"/><rect x="-4" y="-40" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-40" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-50" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-50" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-60" width="8" height="8" rx="1.5" class="b1"/><rect x="-4" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-60" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-24" y="-70" width="8" height="8" rx="1.5" class="b1"/><rect x="-14" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-70" width="8" height="8" rx="1.5" class="b1"/><rect x="16" y="-70" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-80" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-14" y="-90" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-90" width="8" height="8" rx="1.5" class="b1"/>
    </g>

    <!-- ================= PETAL 2 (72°) ================= -->
    <g transform="rotate(72)">
      <rect x="-4" y="-30" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-14" y="-40" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-40" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-40" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-24" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-50" width="8" height="8" rx="1.5" class="b1"/><rect x="-4" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-50" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-60" width="8" height="8" rx="1.5" class="b1"/><rect x="-14" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-60" width="8" height="8" rx="1.5" class="b1"/><rect x="16" y="-60" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-70" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-70" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-24" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-80" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-80" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-14" y="-90" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-90" width="8" height="8" rx="1.5" class="b0"/>
    </g>

    <!-- ================= PETAL 3 (144°) ================= -->
    <g transform="rotate(144)">
      <rect x="-4" y="-30" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-14" y="-40" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-40" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-40" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-50" width="8" height="8" rx="1.5" class="b1"/><rect x="-14" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-50" width="8" height="8" rx="1.5" class="b1"/><rect x="16" y="-50" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-60" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-24" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-70" width="8" height="8" rx="1.5" class="b1"/><rect x="-4" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-70" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-80" width="8" height="8" rx="1.5" class="b1"/><rect x="-14" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-80" width="8" height="8" rx="1.5" class="b1"/><rect x="16" y="-80" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-14" y="-90" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-90" width="8" height="8" rx="1.5" class="b1"/>
    </g>

    <!-- ================= PETAL 4 (216°) ================= -->
    <g transform="rotate(216)">
      <rect x="-4" y="-30" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-14" y="-40" width="8" height="8" rx="1.5" class="b1"/><rect x="-4" y="-40" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-40" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-24" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-50" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-24" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-60" width="8" height="8" rx="1.5" class="b1"/><rect x="-4" y="-60" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-60" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-70" width="8" height="8" rx="1.5" class="b1"/><rect x="-14" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-70" width="8" height="8" rx="1.5" class="b1"/><rect x="16" y="-70" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-80" width="8" height="8" rx="1.5" class="b1"/><rect x="16" y="-80" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-14" y="-90" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-90" width="8" height="8" rx="1.5" class="b0"/>
    </g>

    <!-- ================= PETAL 5 (288°) ================= -->
    <g transform="rotate(288)">
      <rect x="-4" y="-30" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-14" y="-40" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-40" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-40" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-50" width="8" height="8" rx="1.5" class="b1"/><rect x="-4" y="-50" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-50" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-50" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-60" width="8" height="8" rx="1.5" class="b1"/><rect x="-14" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-60" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-60" width="8" height="8" rx="1.5" class="b1"/><rect x="16" y="-60" width="8" height="8" rx="1.5" class="b0"/>
      <rect x="-24" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="-4" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-70" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-70" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-24" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="-14" y="-80" width="8" height="8" rx="1.5" class="b1"/><rect x="6" y="-80" width="8" height="8" rx="1.5" class="b0"/><rect x="16" y="-80" width="8" height="8" rx="1.5" class="b1"/>
      <rect x="-14" y="-90" width="8" height="8" rx="1.5" class="b0"/><rect x="6" y="-90" width="8" height="8" rx="1.5" class="b1"/>
    </g>

  </g>
</svg>